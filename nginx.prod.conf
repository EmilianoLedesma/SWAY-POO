server {
    listen 80;
    client_max_body_size 10M;

    # FastAPI — toda la lógica de negocio
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Swagger UI (útil para revisión en producción)
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React Web2 — portal de colaboradores
    location /portal/ {
        alias /usr/share/nginx/html/portal/;
        try_files $uri $uri/ /portal/index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Assets de React (JS/CSS con hash — cache agresivo)
    location /portal/assets/ {
        alias /usr/share/nginx/html/portal/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Archivos estáticos de Flask (vendor, js, css, imágenes)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Flask Web1 — portal público HTML
    location / {
        proxy_pass http://web:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}

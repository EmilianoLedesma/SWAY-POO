services:
  postgres:
    image: postgres:15
    container_name: sway_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-sway_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sway123}
      POSTGRES_DB: ${DB_NAME:-sway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SWAY_PostgreSQL.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sway_app} -d ${DB_NAME:-sway}"]
      interval: 5s
      retries: 5
      timeout: 5s

  api:
    build: .
    container_name: sway_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-sway_app}:${DB_PASSWORD:-sway123}@postgres:5432/${DB_NAME:-sway}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000,http://localhost:5173}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    container_name: sway_web
    restart: always
    command: gunicorn web:app --bind 0.0.0.0:5000 --workers 2 --timeout 120
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-sway_app}:${DB_PASSWORD:-sway123}@postgres:5432/${DB_NAME:-sway}
      SECRET_KEY: ${SECRET_KEY:-sway_secret_key_ultra_secreta}
      DEBUG: "False"
      FLASK_ENV: production
      API_BASE_URL: /api
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: sway_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./web2/dist:/usr/share/nginx/html/portal
      - ./assets:/usr/share/nginx/html/static
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - web

volumes:
  postgres_data:
